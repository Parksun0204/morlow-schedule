<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morlow 일정관리 · 팀 가능시간 (집계 결과)</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background: #f7f8fa; color: #1f2430; }
h1 { font-size: 20px; margin: 0 0 4px; }
.sub { color: #6b7280; font-size: 13px; margin: 0 0 6px; }
.snap { display:inline-block; font-size:11px; color:#15803d; background:#dcfce7; border:1px solid #bbf7d0; padding:2px 8px; border-radius:999px; margin-bottom:14px; }
.panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.panel h2 { font-size: 14px; margin: 0 0 12px; color: #374151; }
.evt { font-size:14px; color:#374151; margin-bottom:10px; }
.evt b { color:#111827; }
.users { display:flex; flex-wrap:wrap; gap:8px; }
.user-chip { display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:20px; background:#f3f4f6; font-size:13px; }
.user-chip .dot { width:12px; height:12px; border-radius:50%; }
.scroll { overflow-x:auto; }
table.cal { border-collapse: collapse; }
table.cal th { font-size:12px; color:#6b7280; font-weight:600; padding:6px 12px; text-align:center; white-space:nowrap; }
table.cal td.lbl { font-size:11px; color:#6b7280; text-align:right; padding:0 10px; white-space:nowrap; }
table.cal td.lbl.hh { color:#111827; font-weight:600; border-top:1px solid #d1d5db; }
table.cal td.cell { width:140px; height:22px; border:1px solid #eef0f2; position:relative; vertical-align:middle; text-align:center; }
table.cal td.cell.hh { border-top:1px solid #d1d5db; }
table.cal td.cell.na { background:repeating-linear-gradient(45deg,#fafafa,#fafafa 5px,#f2f2f2 5px,#f2f2f2 10px); }
.cell .names { font-size:10px; color:#14532d; line-height:1.2; padding:0 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cell .cnt { position:absolute; right:3px; top:1px; font-size:9px; font-weight:700; color:#14532d; opacity:.6; }
.cell.all { outline:2px solid #f59e0b; outline-offset:-2px; }
.cell.all::after { content:"★"; position:absolute; left:3px; top:0; font-size:10px; color:#f59e0b; }
.legend { display:flex; align-items:center; gap:10px; margin-top:12px; font-size:12px; color:#6b7280; flex-wrap:wrap; }
.legend .scale { display:flex; }
.legend .scale i { width:24px; height:16px; display:inline-block; border:1px solid #e5e7eb; }
.summary { display:flex; flex-wrap:wrap; gap:8px; }
.summary .slot { background:#16a34a; color:#fff; padding:6px 10px; border-radius:8px; font-size:13px; font-weight:600; }
.summary .none { color:#9ca3af; font-size:13px; }
.best { font-size:13px; color:#374151; margin-bottom:8px; }
.note { font-size:12px; color:#9ca3af; margin-top:8px; }
</style>
</head>
<body>
<h1>🥬 Morlow 일정관리 — 팀 가능시간 (집계 결과)</h1>
<p class="sub">📌 <b>보기 전용</b> 화면입니다. 입력은 Notion <b>③ 참가자 응답 폼</b>에서 하세요 — 제출하면 이 결과에 반영됩니다. (30분 단위)</p>
<span class="snap" id="snap"></span>

<div class="panel">
  <div class="evt" id="evt"></div>
  <div class="users" id="users"></div>
</div>

<div class="panel">
  <h2>📅 겹침 히트맵 · 30분 단위 (초록이 진할수록 많은 인원, ★ = 전원 가능)</h2>
  <div class="scroll"><table class="cal" id="grid"></table></div>
  <div class="legend"><span>적음</span><span class="scale" id="legend"></span><span>전원</span><span style="margin-left:8px;">★ = 전원 가능</span></div>
</div>

<div class="panel">
  <h2>✅ 모두가 가능한 시간</h2>
  <div class="best" id="best"></div>
  <div class="summary" id="summary"></div>
  <div class="note" id="srcnote"></div>
</div>

<script>
// ===== Notion DB 스냅샷. 동기화 시 이 DATA만 교체됩니다. =====
const DATA = {
  snapshot: "2026-06-16 19:00",
  event: { name: "예시 · Morlow 모임 (지우고 사용하세요)", range: "2026-06-21" },
  participants: [
    { name: "정규", color: "#2563eb" },
    { name: "민지", color: "#dc2626" },
    { name: "현우", color: "#d97706" }
  ],
  // 표시 시간 범위 (30분 단위)
  startHour: 0,
  endHour: 12,   // 00:00 ~ 11:59 (마지막 11:30)
  days: [
    { date: "2026-06-21", label: "6/21(일)" }
  ],
  // slots: "YYYY-MM-DD|HH:MM" -> [가능한 사람]
  slots: {
    "2026-06-21|09:00": ["정규"],
    "2026-06-21|09:30": ["정규", "민지"],
    "2026-06-21|10:00": ["정규", "민지", "현우"],
    "2026-06-21|10:30": ["민지"]
  }
};
// ===========================================================

(function(){
  const total = DATA.participants.length;
  const pad = n => String(n).padStart(2,"0");
  const times = [];
  for(let m = DATA.startHour*60; m < DATA.endHour*60; m += 30) times.push(pad(Math.floor(m/60))+":"+pad(m%60));

  document.getElementById("snap").textContent = "Notion DB 반영 · 스냅샷: " + DATA.snapshot;
  document.getElementById("evt").innerHTML = "<b>"+esc(DATA.event.name)+"</b> · 날짜 "+esc(DATA.event.range)+" · 참가자 "+total+"명";
  const uc = document.getElementById("users");
  DATA.participants.forEach(p=>{ const d=document.createElement("div"); d.className="user-chip"; d.innerHTML='<span class="dot" style="background:'+p.color+'"></span>'+esc(p.name); uc.appendChild(d); });

  const g = document.getElementById("grid");
  let html = "<thead><tr><th></th>";
  DATA.days.forEach(d=> html+="<th>"+d.label+"</th>");
  html += "</tr></thead><tbody>";
  times.forEach(t=>{
    const hh = t.endsWith(":00") ? " hh" : "";
    html += "<tr><td class='lbl"+hh+"'>"+t+"</td>";
    DATA.days.forEach(d=>{
      const key = d.date+"|"+t;
      const av = DATA.slots[key];
      if(!av){ html += "<td class='cell na"+hh+"'></td>"; return; }
      const c = av.length;
      const alpha = (0.12 + 0.73*(c/total)).toFixed(3);
      const all = (c===total && total>0) ? " all" : "";
      html += "<td class='cell"+hh+all+"' style='background:rgba(22,163,74,"+alpha+")' title='"+esc(av.join(', '))+" ("+c+"/"+total+")'>"
            + "<span class='cnt'>"+c+"</span><div class='names'>"+esc(av.join(', '))+"</div></td>";
    });
    html += "</tr>";
  });
  html += "</tbody>";
  g.innerHTML = html;

  const lg = document.getElementById("legend");
  for(let c=1;c<=total;c++){ const i=document.createElement("i"); i.style.background="rgba(22,163,74,"+(0.12+0.73*(c/total)).toFixed(3)+")"; lg.appendChild(i); }

  let all=[], max=0, maxK=[];
  Object.keys(DATA.slots).forEach(k=>{ const c=DATA.slots[k].length; if(c>max){max=c;maxK=[k];}else if(c===max&&c>0)maxK.push(k); if(total>0&&c===total)all.push(k); });
  const fmt = k=>{ const [date,t]=k.split("|"); const d=DATA.days.find(x=>x.date===date); return (d?d.label:date)+" "+t; };
  const best=document.getElementById("best"), sum=document.getElementById("summary");
  if(all.length){ best.innerHTML="전원("+total+"명) 가능한 시간이 <b>"+all.length+"개</b> 있습니다:"; all.sort().forEach(k=>{const s=document.createElement("span");s.className="slot";s.textContent=fmt(k);sum.appendChild(s);}); }
  else if(max>0){ best.innerHTML="아직 전원 가능한 시간이 없습니다. 현재 최다 <b>"+max+"/"+total+"명</b>:"; maxK.forEach(k=>{const s=document.createElement("span");s.className="slot";s.style.background="#6b7280";s.textContent=fmt(k);sum.appendChild(s);}); }
  else { best.innerHTML="<span class='none'>아직 응답이 없습니다.</span>"; }

  document.getElementById("srcnote").textContent = "출처: Notion ③ 참가자 응답 · 입력은 폼(날짜=캘린더, 시간=30분 드롭다운)에서, 결과는 여기에 반영됩니다.";

  function esc(s){ return String(s).replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
})();
</script>
</body>
</html>
